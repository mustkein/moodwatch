server:
  port: ${MOVIE_SERVICE_PORT:8083}

spring:
  application:
    name: movie-service
  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: 27017
      database: moodwatch
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

tmdb:
  api-key: ${TMDB_API_KEY}
  base-url: https://api.themoviedb.org/3
