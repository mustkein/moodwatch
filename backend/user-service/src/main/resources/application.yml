server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/user_db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

jwt:
  secret: ${JWT_SECRET}
  access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
  refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
