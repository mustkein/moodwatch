server:
  port: ${GATEWAY_PORT:8080}

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: movie-service
          uri: http://${MOVIE_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/movies/**
        - id: social-service
          uri: http://${SOCIAL_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/reviews/**,/api/watched/**,/api/feed/**
        - id: recommendation-service
          uri: http://${RECOMMENDATION_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/recommendations/**
