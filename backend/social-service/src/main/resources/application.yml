server:
  port: ${SOCIAL_SERVICE_PORT:8082}

spring:
  application:
    name: social-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/social_db
    username: ${POSTGRES_USER:sa}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: 27017
      database: moodwatch
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
