services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./backend/user-service
    ports:
      - "8081:8081"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS}
    depends_on: [postgres, redis]

  movie-service:
    build: ./backend/movie-service
    ports:
      - "8083:8083"
    environment:
      REDIS_HOST: redis
      MONGO_HOST: mongo
      TMDB_API_KEY: ${TMDB_API_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on: [mongo, redis]

  social-service:
    build: ./backend/social-service
    ports:
      - "8082:8082"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MONGO_HOST: mongo
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on: [postgres, mongo]

  recommendation-service:
    build: ./backend/recommendation-service
    ports:
      - "8084:8084"
    environment:
      REDIS_HOST: redis
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on: [redis]

  gateway:
    build: ./backend/gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      SOCIAL_SERVICE_HOST: social-service
      MOVIE_SERVICE_HOST: movie-service
      RECOMMENDATION_SERVICE_HOST: recommendation-service
    depends_on: [user-service, movie-service, social-service, recommendation-service]

volumes:
  postgres_data:
  mongo_data:
  redis_data:
